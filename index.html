<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filament Calculator</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <h1 class="siteTitle">Filament Calculator</h1>
    <p class="titleText">Calculate material cost for your 3D prints.</p>
    <div class="MainDiv">
        <label for="grams">Grams used</label>
        <input id="grams" type="number" placeholder="Grams used">

        <label for="filamentPrice">Filament price per kg</label>
        <input id="filamentPrice" type="number" placeholder="Filament price per kg">
        <button id="calculateBtn">Calculate</button>
        <p id="result"></p>
    </div>
</body>
</html>
